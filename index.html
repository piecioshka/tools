<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tools — base64, binary, slugify, proportions, date diff</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="description" content="A collection of small in-browser tools: base64 and binary converters, slugify, proportions calculator, date diff and text formatting cleaner."/>
    <meta name="theme-color" content="#fab229"/>

    <meta property="og:url" content="https://piecioshka.github.io/tools/"/>
    <meta property="og:locale" content="en_US"/>
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="Tools"/>
    <meta property="og:description" content="Stack of Tools in JavaScript"/>
    <meta property="og:image" content="https://piecioshka.github.io/tools/opg.png"/>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/form-controls.css">
    <link rel="stylesheet" href="styles/error-handler.css">
    <link rel="stylesheet" href="styles/github-corner.css">

    <script defer src="scripts/error-handler.js"></script>
    <script defer src="scripts/shared/setup-component.js"></script>
    <script defer src="scripts/base64-converter.js"></script>
    <script defer src="scripts/binary-converter.js"></script>
    <script defer src="scripts/proportions.js"></script>
    <script defer src="scripts/remove-text-formatting.js"></script>
    <script defer src="scripts/slugify.js"></script>
    <script defer src="scripts/date-diff.js"></script>
</head>
<body>

    <h1 class="visually-hidden">Tools</h1>

    <main>
        <section id="remove-text-formatting" class="component">
            <h2><a href="#remove-text-formatting">Remove Text Formatting</a></h2>

            <div class="component-content">
                <fieldset>
                    <legend>Paste any text here <em>(it will be saved in LocalStorage)</em></legend>
                    <label for="remove-text-formatting-input" class="visually-hidden">Text to clean</label>
                    <textarea id="remove-text-formatting-input" placeholder="Paste here..." rows="10"></textarea>
                </fieldset>
            </div>
        </section>

        <section id="binary" class="component">
            <h2><a href="#binary">Binary Converter</a></h2>

            <div class="component-content">
                <fieldset>
                    <legend>Text → Binary</legend>
                    <label for="text-binary-input" class="visually-hidden">Text to encode</label>
                    <textarea id="text-binary-input" rows="5" placeholder="Enter text here..."></textarea>
                    <button id="text-binary-convert">Encode</button>
                    <label for="text-binary-output" class="visually-hidden">Binary output</label>
                    <textarea id="text-binary-output" rows="5" readonly></textarea>
                </fieldset>

                <fieldset>
                    <legend>Binary → Text</legend>
                    <label for="binary-text-input" class="visually-hidden">Binary to decode</label>
                    <textarea id="binary-text-input" rows="5" placeholder="Enter text here..."></textarea>
                    <button id="binary-text-convert">Decode</button>
                    <label for="binary-text-output" class="visually-hidden">Text output</label>
                    <textarea id="binary-text-output" rows="5" readonly></textarea>
                </fieldset>
            </div>
        </section>

        <section id="slugify" class="component">
            <h2><a href="#slugify">Slugify</a></h2>

            <div class="component-content">
                <fieldset>
                    <label for="slugify-strategy" class="visually-hidden">Normalization form</label>
                    <select id="slugify-strategy">
                        <option value="NFC">NFC - Canonical Decomposition, followed by Canonical Composition</option>
                        <option value="NFD" selected>NFD - Canonical Decomposition</option>
                        <option value="NFKC">NFKC — Compatibility Decomposition, followed by Canonical Composition</option>
                        <option value="NFKD">NFKD - Compatibility Decomposition</option>
                    </select>
                    <label for="slugify-input" class="visually-hidden">Text to slugify</label>
                    <textarea id="slugify-input" rows="5" placeholder="Paste here..."></textarea>
                    <button id="slugify-slug">Slug</button>
                    <label for="slugify-output" class="visually-hidden">Slug output</label>
                    <textarea id="slugify-output" rows="5" readonly></textarea>
                </fieldset>
            </div>
        </section>

        <section id="base64" class="component">
            <h2><a href="#base64">Base64 Converter</a></h2>

            <div class="component-content">
                <fieldset>
                    <legend>Text → Base64</legend>
                    <label for="text-base64-input" class="visually-hidden">Text to encode</label>
                    <textarea id="text-base64-input" rows="5" placeholder="Enter text here..."></textarea>
                    <button id="text-base64-convert">Encode</button>
                    <label for="text-base64-output" class="visually-hidden">Base64 output</label>
                    <textarea id="text-base64-output" rows="5" readonly></textarea>
                </fieldset>

                <fieldset>
                    <legend>Base64 → Text</legend>
                    <label for="base64-text-input" class="visually-hidden">Base64 to decode</label>
                    <textarea id="base64-text-input" rows="5" placeholder="Enter text here..."></textarea>
                    <button id="base64-text-convert">Decode</button>
                    <label for="base64-text-output" class="visually-hidden">Text output</label>
                    <textarea id="base64-text-output" rows="5" readonly></textarea>
                </fieldset>
            </div>
        </section>

        <section id="proportions" class="component">
            <h2><a href="#proportions">Proportions</a></h2>

            <div class="component-content two-columns">
                <fieldset>
                    <legend>Left</legend>
                    <label>
                        <span class="visually-hidden">X</span>
                        <input type="number" class="x" value="0"/>
                    </label>

                    <hr class="half-screen"/>

                    <label>
                        <span class="visually-hidden">Y</span>
                        <input type="number" class="y" value="0"/>
                    </label>

                    <output class="ratio ratio-left" aria-live="polite">Ratio: 0 : 0</output>
                </fieldset>

                <fieldset>
                    <legend>Right</legend>
                    <label>
                        <span class="visually-hidden">Z</span>
                        <input type="number" class="z" value="0"/>
                    </label>

                    <hr class="half-screen"/>

                    <label>
                        <span class="visually-hidden">Result</span>
                        <input type="number" class="q" value="0" readonly/>
                    </label>

                    <output class="ratio ratio-right" aria-live="polite">Ratio: 0 : 0</output>
                </fieldset>
            </div>
        </section>

        <section id="date-diff" class="component">
            <h2><a href="#date-diff">Date Diff</a></h2>

            <div class="component-content two-columns">
                <fieldset>
                    <legend>From</legend>
                    <label>
                        <span class="visually-hidden">From date</span>
                        <input type="date" class="date-diff-from" value="2025-01-01"/>
                    </label>
                </fieldset>
                <fieldset>
                    <legend>To</legend>
                    <label>
                        <span class="visually-hidden">To date</span>
                        <input type="date" class="date-diff-to" value="2025-05-01"/>
                    </label>
                </fieldset>
            </div>

            <div class="component-content two-columns">
                <fieldset>
                    <button class="date-diff-calculate">Calculate</button>
                </fieldset>
                <fieldset>
                    <label class="visually-hidden" for="date-diff-text-output">Result</label>
                    <input id="date-diff-text-output" class="date-diff-text-output" type="text" readonly/>
                </fieldset>
            </div>
        </section>
    </main>

    <div class="error-message hide" role="alert" aria-live="assertive">
        <div class="error-message-content">
            <h3 class="error-header">Error!</h3>
            <p class="error-text"></p>
        </div>
    </div>

</body>
</html>
